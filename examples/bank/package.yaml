name: examples-bank
version: "0.2.1"
maintainer: Alexander Sidorenko
synopsis: Example bank application for eventium
description: |
  A complete banking application example built with Eventium that demonstrates event sourcing patterns.
  This example showcases account management with command handlers, customer operations, transfer process
  managers, and read models for customer accounts. It provides a practical reference implementation for
  building event-sourced applications with Eventium, including CLI interface, persistence with SQLite,
  and comprehensive domain modeling.
stability: experimental
license: MIT

flags:
  ci:
    description: Enable -Werror for CI builds
    manual: true
    default: false

when:
  - condition: flag(ci)
    ghc-options: -Werror

dependencies:
  - base >= 4.9 && < 5
  - eventium-core >= 0.2.0 && < 0.3.0
  - eventium-sqlite >= 0.2.0 && < 0.3.0

  - aeson >= 1.5 && < 2.3
  - aeson-pretty >= 0.8 && < 0.9
  - bytestring >= 0.10 && < 0.13
  - containers >= 0.6 && < 0.8
  - contravariant >= 1.5 && < 1.6
  - monad-logger >= 0.3 && < 0.4
  - mtl >= 2.2 && < 2.4
  - optparse-applicative >= 0.15 && < 0.19
  - persistent >= 2.14 && < 2.18
  - persistent-sqlite >= 2.13 && < 2.14
  - safe >= 0.3 && < 0.4
  - stm >= 2.5 && < 2.6
  - template-haskell >= 2.20 && < 2.23
  - text >= 1.2 && < 2.2
  - time >= 1.9 && < 1.15
  - uuid >= 1.3 && < 1.4

library:
  source-dirs:
    - src
  ghc-options: -Wall -Wcompat -Widentities -Wincomplete-record-updates -Wredundant-constraints -Wno-type-defaults -Wno-incomplete-uni-patterns
  default-extensions:
    - NoFieldSelectors
    - DuplicateRecordFields
    - OverloadedRecordDot

executables:
  bank-main:
    main: bank-main.hs
    ghc-options: -Wall -Wcompat -Widentities -Wincomplete-record-updates -Wredundant-constraints -Wno-type-defaults -Wno-incomplete-uni-patterns
    source-dirs:
      - executables
    default-extensions:
      - NoFieldSelectors
      - DuplicateRecordFields
      - OverloadedRecordDot
    dependencies:
      - examples-bank

tests:
  spec:
    main: Spec.hs
    ghc-options: -Wall -Wcompat -Widentities -Wincomplete-record-updates -Wredundant-constraints -Wno-type-defaults -Wno-incomplete-uni-patterns
    source-dirs:
      - tests
      - src
    default-extensions:
      - NoFieldSelectors
      - DuplicateRecordFields
      - OverloadedRecordDot
    dependencies:
      - hspec
      - HUnit
      - eventium-testkit
    build-tools:
      - hspec-discover
