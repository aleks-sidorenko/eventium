name: examples-cafe
version: "0.2.1"
maintainer: Alexander Sidorenko
synopsis: Example cafe application for eventium
description: |
  A cafe ordering system example built with Eventium, inspired by Edument's CQRS tutorial. This example
  demonstrates event-driven workflow patterns including order management, chef todo lists, and event-based
  coordination. It showcases both in-memory and persistent storage options, command-line interface design,
  and practical patterns for building event-sourced applications with complex workflows and multiple read models.
stability: experimental
license: MIT

flags:
  ci:
    description: Enable -Werror for CI builds
    manual: true
    default: false

when:
  - condition: flag(ci)
    ghc-options: -Werror

dependencies:
  - base >= 4.9 && < 5
  - eventium-core >= 0.2.0 && < 0.3.0
  - eventium-sqlite >= 0.2.0 && < 0.3.0

  - aeson >= 1.5 && < 2.3
  - aeson-pretty >= 0.8 && < 0.9
  - ansi-terminal >= 0.11 && < 1.2
  - bytestring >= 0.10 && < 0.13
  - containers >= 0.6 && < 0.8
  - monad-logger >= 0.3 && < 0.4
  - mtl >= 2.2 && < 2.4
  - optparse-applicative >= 0.15 && < 0.19
  - persistent >= 2.14 && < 2.18
  - persistent-sqlite >= 2.13 && < 2.14
  - safe >= 0.3 && < 0.4
  - text >= 1.2 && < 2.2

library:
  source-dirs:
    - src
  ghc-options: -Wall -Wcompat -Widentities -Wincomplete-record-updates -Wredundant-constraints -Wno-type-defaults -Wno-incomplete-uni-patterns
  default-extensions:
    - NoFieldSelectors
    - DuplicateRecordFields
    - OverloadedRecordDot

executables:
  cafe-main:
    main: cafe-main.hs
    ghc-options: -Wall -Wcompat -Widentities -Wincomplete-record-updates -Wredundant-constraints -Wno-type-defaults -Wno-incomplete-uni-patterns
    source-dirs:
      - app
    default-extensions:
      - NoFieldSelectors
      - DuplicateRecordFields
      - OverloadedRecordDot
    dependencies:
      - examples-cafe

  cafe-chef-todo-main:
    main: cafe-chef-todo-main.hs
    ghc-options: -Wall -Wcompat -Widentities -Wincomplete-record-updates -Wredundant-constraints -Wno-type-defaults -Wno-incomplete-uni-patterns
    source-dirs:
      - app
    default-extensions:
      - NoFieldSelectors
      - DuplicateRecordFields
      - OverloadedRecordDot
    dependencies:
      - examples-cafe
