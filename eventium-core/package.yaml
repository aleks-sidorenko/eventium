name: eventium-core
version: "0.2.1"
maintainer: Alexander Sidorenko
synopsis: Core module for eventium
description: |
  Eventium-core provides the core abstractions and utilities for building event sourcing systems in Haskell.
  It includes event store interfaces, command handlers, projections, event handlers, event publishers,
  event subscriptions, process managers, and Template Haskell utilities for generating boilerplate code.
  This is the foundational package that all other Eventium modules build upon.
stability: experimental
category: Database,Eventsourcing
license: MIT
license-file: LICENSE.md

github: aleks-sidorenko/eventium

extra-source-files:
  - CHANGELOG.md
  - README.md

flags:
  ci:
    description: Enable -Werror for CI builds
    manual: true
    default: false

when:
  - condition: flag(ci)
    ghc-options: -Werror

dependencies:
  - base >= 4.9 && < 5

  - aeson >= 1.5 && < 2.3
  - containers >= 0.6 && < 0.8
  - contravariant >= 1.5 && < 1.6
  - http-api-data >= 0.4 && < 0.7
  - path-pieces >= 0.2 && < 0.3
  - template-haskell >= 2.20 && < 2.23
  - text >= 1.2 && < 2.2
  - time >= 1.9 && < 1.14
  - transformers >= 0.5 && < 0.7
  - uuid >= 1.3 && < 1.4

library:
  source-dirs:
    - src
  ghc-options: -Wall -Wcompat -Widentities -Wincomplete-record-updates -Wredundant-constraints -Wno-type-defaults -Wno-incomplete-uni-patterns
  default-extensions:
    - NoFieldSelectors
    - DuplicateRecordFields
    - OverloadedRecordDot

tests:
  spec:
    main: Spec.hs
    ghc-options: -Wall -Wcompat -Widentities -Wincomplete-record-updates -Wredundant-constraints -Wno-type-defaults -Wno-incomplete-uni-patterns
    default-extensions:
      - NoFieldSelectors
      - DuplicateRecordFields
      - OverloadedRecordDot
    source-dirs:
      - tests
      - src
    dependencies:
      - hspec
      - HUnit
    build-tools:
      - hspec-discover
